<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUTRACK - calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
    <div class="logo">EduTrack</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="subject.html">Subject</a>
        <a href="calculater.html"  class="active">Calculator</a>
        <a href="notes.html">Notes</a>
    </nav>
    </header>
    <main>
        <section class="page-header">
            <div class="container">
                <h2> Grade calculator</h2>
            </div>
        </section>

             <section class="container"> 
                <div class="stat-grid" style="margin-bottom: 32px ;">
                    <div class="stat-card">
                        <div class="stat-number" id="avg-display"> --%</div>
                        <div class="stat-label"> Weighted Average</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="gpa-display">--</div>
                        <div class="stat-label">GPA / 4.0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="grade-display">--</div>
                        <div class="stat-label">Overall grade</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="credits-display">--</div>
                        <div class="stat-label">Total Credits</div>
                    </div>
                    <div class="card" style="background-color: var(--surface); padding: 32px; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
                        <h3>Overall Progress</h3>
                        <div class="progres-track">
                            <div id="progres-bar" class="progres-bar"></div>
                        </div>
                        <table id="breakdowm-table" style="width: 100%; border-collapse: collapse; margin-top: 32px;">
                            <thead>
                            <tr style="text-align: left; border-bottom: 2px solid var(--border);">
                                <th style="padding: 12px;">Subject</th>
                                <th style="padding: 12px;">Grade</th>
                                 <th style="padding: 12px;">Credits</th>
                                  <th style="padding: 12px;">Weighted</th>
                                  </tr>
                           </thead>
                           <tbody id="calculator-body">
                            <!-- it will be filled by JS-->
                           </tbody>
                        </table>
                    </div>
                </div>
            </section>
    </main>
     <footer class="footer">
        <p>&copy; 2026 Edu-Track. All rights reserved. Level Iga-Now Tech Program Internship</p>
    </footer>
</body>
</html>
