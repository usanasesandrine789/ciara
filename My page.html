<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack -Student Dashboard</title>
    <link rel="styleshhet" href="#">
</head>


<body>
    <header class="navbar">
        <div class="logo">EduTrack</div>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="#">Subject</a>
             <a href="#">Calculator</a>
              <a href="#">Notes</a>

            
        </nav>
    <main>
        <section class="hero">
            
            <h1>Welcome, <span id="Student-name">Student</span>!</h1>
            <p class="Subtitle">Track your academic progress in one place</p>
            </section>

            <section class="stats-section">
                <div class="container">
                    <div class="stats-grid"></div>
                        <div class="stats-card"></div>
                        <div class="stat-number" id="total-subject">4</div>
                        <div class="stat-label">Subjects</div>

                </div>
                <div class="stat-card">
                    <div class="stat-number" id="average">_</div>
                    <div class="stat-label">Average Grade</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="gpa">_</div>
                    <div class="stat-label">GPA(out of 4.0)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="credits">11</div>
                    <div class="stat-label">Total credits</div>
                </div>
                </section>
           
    </main>
